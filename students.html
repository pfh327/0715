<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassCare | 학생 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="students">
  <div class="shell">
    <section class="workspace">
      <aside class="panel">
        <div class="panel-header">
          <div><h2>학생 프로필</h2><p class="muted">학생을 선택하면 해당 학생의 누적 기록만 봅니다.</p></div>
          <div class="report-actions">
            <button class="danger-btn" id="deleteStudentButton" type="button">선택 학생 삭제</button>
          </div>
        </div>
        <form id="studentForm">
          <div class="input-grid">
            <label>학생 이름<input type="text" id="studentName" required></label>
            <label>과목<select id="studentSubject" required><option value="">선택</option><option>수학</option><option>영어</option><option>과학</option><option>국어</option></select></label>
          </div>
          <div class="input-grid">
            <label>학년<input type="text" id="studentGrade"></label>
            <label>수업 일정<input type="text" id="studentSchedule"></label>
          </div>
          <label>학부모 메모<input type="text" id="parentNote"></label>
          <label>현재 집중 영역<textarea id="studentFocus"></textarea></label>
          <button class="primary-btn" type="submit">학생 추가하기</button>
        </form>
        <div class="panel-header" style="margin-top:26px;"><div><h2>학생 목록</h2></div></div>
        <div class="student-list" id="studentList"></div>
        <div class="mini-card" style="margin-top:26px; border-color:#f0d0c3; background:#fff8f4;">
          <h3 style="color:#c45a3c;">위험 구역</h3>
          <p class="muted">아래 기능은 데모 데이터를 모두 지웁니다. 학생관리 페이지에서만 사용할 수 있도록 분리했습니다.</p>
          <button class="danger-btn" id="resetDemoButton" type="button">데모 전체 초기화</button>
        </div>
      </aside>
      <main>
        <nav class="app-nav">
          <a class="nav-btn" href="index.html">홈</a>
          <a class="nav-btn active" href="students.html">학생 관리</a>
          <a class="nav-btn" href="records.html">수업 기록</a>
          <a class="nav-btn" href="review.html">복습문제 AI 추천</a>
          <a class="nav-btn" href="reports.html">리포트</a>
        </nav>
        <section class="section-card">
          <div class="card-title"><div><h3>선택 학생의 누적 수업 기록</h3><p class="muted">기록이 많아져도 이 페이지에서만 상세 확인합니다.</p></div></div>
          <div class="timeline" id="timeline"></div>
        </section>
      </main>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
